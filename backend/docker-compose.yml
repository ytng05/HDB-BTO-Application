services:
  kong-database:
    image: postgres:17.4
    container_name: kong_database
    restart: always
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - kong_pgdata:/var/lib/postgresql/data

  kong-migration:
    image: kong/kong-gateway:3.9
    container_name: kong_migration
    command: "kong migrations bootstrap"
    restart: on-failure
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: password
    depends_on:
      - kong-database

  kong:
    image: kong/kong-gateway:3.9
    container_name: kong_gateway
    restart: always
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: password
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_URL: http://localhost:8002
    depends_on:
      - kong-migration
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"

  document-db:
    image: mysql:8.0
    container_name: document_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: documents
    ports:
      - "3350:3306"
    volumes:
      - document_db_data:/var/lib/mysql
      - ./document/documents.sql:/docker-entrypoint-initdb.d/documents.sql:ro
    restart: always

  document-service:
    build:
      context: ./document
      dockerfile: Dockerfile
    container_name: document_service
    ports:
      - "5050:5050"
    environment:
      DATABASE_URL: mysql+mysqlconnector://root:root@document-db:3306/documents
      OCR_DATA_DIR: /data
      OCR_STORAGE_DIR: /data/documents
    volumes:
      - ./document/data:/data
    depends_on:
      - document-db
    restart: always

  application-db:
    image: mysql:8.0
    container_name: application_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: applications
    ports:
      - "3304:3306"
    volumes:
      - application_db_data:/var/lib/mysql
      - ./application/applications.sql:/docker-entrypoint-initdb.d/applications.sql:ro
    restart: always

  application-service:
    build:
      context: ./application
      dockerfile: Dockerfile
    container_name: application_service
    ports:
      - "5004:5004"
    environment:
      DATABASE_URL: mysql+mysqlconnector://root:root@application-db:3306/applications
    depends_on:
      - application-db
    restart: always

  mockpass-service:
    build:
      context: .
      dockerfile: mockpass/Dockerfile
    container_name: mockpass_service
    ports:
      - "5156:5156"
    environment:
      SHOW_LOGIN_PAGE: "true"
      MOCKPASS_STATELESS: "true"
      MYINFO_V3_PATH: /app/v3.json
      # MyInfo v3 Configuration - Use test certificates from npm package (local install)
      SERVICE_PROVIDER_CERT_PATH: /app/node_modules/@opengovsg/mockpass/static/certs/server.crt
      SERVICE_PROVIDER_PUB_KEY: /app/node_modules/@opengovsg/mockpass/static/certs/key.pub
      SERVICE_PROVIDER_MYINFO_SECRET: test-secret-key
      ENCRYPT_MYINFO: "false"
    restart: always

  singpass-service:
    build:
      context: ./singpass
      dockerfile: Dockerfile
    container_name: singpass_service
    ports:
      - "5007:5007"
    environment:
      MOCKPASS_URL: http://mockpass-service:5156
      MOCKPASS_BROWSER_URL: http://localhost:5156
      MOCKPASS_AUTH_PATH: /singpass/v2/auth
      MOCKPASS_CLIENT_ID: hdb-flat-portal
      # Enable session management: true | false
      ENABLE_SESSIONS: "true"
      SESSION_TIMEOUT_MINUTES: 60
      AUTH_STATE_TIMEOUT_SECONDS: 300
      FRONTEND_URL: http://localhost:5173
      FRONTEND_AUTH_CALLBACK_PATH: /auth/callback
    depends_on:
      - mockpass-service
    restart: always

  hfe-application-db:
    image: mysql:8.0
    container_name: hfe_application_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hfe_applications
    ports:
      - "3309:3306"
    volumes:
      - hfe_application_db_data:/var/lib/mysql
      - ./hfe_application/hfe_application.sql:/docker-entrypoint-initdb.d/hfe_application.sql:ro
    restart: always

  hfe-application-service:
    build:
      context: ./hfe_application
      dockerfile: Dockerfile
    container_name: hfe_application_service
    ports:
      - "5009:5009"
    environment:
      DATABASE_URL: mysql+mysqlconnector://root:root@hfe-application-db:3306/hfe_applications
    depends_on:
      - hfe-application-db
    restart: always

  check-eligibility-service:
    build:
      context: ./check_eligibility
      dockerfile: Dockerfile
    container_name: check_eligibility_service
    ports:
      - "5008:5008"
    environment:
      DOCUMENT_SERVICE_URL: http://document-service:5050
      HFE_APPLICATION_SERVICE_URL: http://hfe-application-service:5009
    restart: always

  validate-eligibility-service:
    build:
      context: ./validate_eligibility
      dockerfile: Dockerfile
    container_name: validate_eligibility_service
    ports:
      - "5013:5013"
    environment:
      SINGPASS_SERVICE_URL: http://singpass-service:5007
      APPLICATION_SERVICE_URL: http://application-service:5004
    depends_on:
      - singpass-service
      - application-service
    restart: always

  ballot-service:
    build:
      context: ./ballot
      dockerfile: Dockerfile
    container_name: ballot_service
    ports:
      - "5005:5005"
    restart: always

  apply-bto-service:
    build:
      context: ./apply_bto
      dockerfile: Dockerfile
    container_name: apply_bto_service
    ports:
      - "5010:5010"
    environment:
      NETS_PAYMENT_SERVICE_URL: http://nets-payment-service:5003
      APPLICATION_SERVICE_URL: http://application-service:5004
      CHECK_ELIGIBILITY_SERVICE_URL: http://check-eligibility-service:5008
      NOTIFICATION_SERVICE_URL: http://notification-api:5000
      NOTIFICATION_QUEUE_NAME: hdb_notification_queue
      APPLICATION_FEE: 10
    depends_on:
      - notification-api
    restart: always

  nets-payment-service:
    build:
      context: ./nets_payment
      dockerfile: Dockerfile.txt
    container_name: nets_payment_service
    ports:
      - "5003:5003"
    environment:
      NETS_API_KEY_ID: ${NETS_API_KEY_ID:-your-api-key-id}
      NETS_SECRET_KEY: ${NETS_SECRET_KEY:-your-secret-key}
      NETS_MID: ${NETS_MID:-your-umid}
      NETS_ENVIRONMENT: ${NETS_ENVIRONMENT:-uat}
      NETS_CALLBACK_BASE: ${NETS_CALLBACK_BASE:-http://localhost:5003}
      NETS_B2S_CALLBACK_URL: ${NETS_B2S_CALLBACK_URL:-}
      NETS_S2S_CALLBACK_URL: ${NETS_S2S_CALLBACK_URL:-}
      NETS_QUERY_URL: ${NETS_QUERY_URL:-}
      NETS_IP_ADDRESS: ${NETS_IP_ADDRESS:-}
      NETS_MERCHANT_TIMEZONE: ${NETS_MERCHANT_TIMEZONE:-+8:00}
      HDB_PORTAL_URL: ${HDB_PORTAL_URL:-http://localhost:5173}
    restart: always

  flat-allocation-service:
    build:
      context: ./flat_allocation
      dockerfile: Dockerfile
    container_name: flat_allocation_service
    ports:
      - "5016:5005"
    environment:
      FLAT_AVAILABILITY_URL: http://flat-service:5006
      APPLICANT_URL: http://application-service:5004
      FLAT_SELECTION_URL: http://flat-selection-service:5002
      NETS_PAYMENT_URL: http://nets-payment-service:5003
      NOTIFICATION_URL: http://notification-api:5000
      NOTIFICATION_QUEUE_NAME: hdb_notification_queue
      RABBITMQ_HOST: ${RABBITMQ_HOST:-localhost}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
    depends_on:
      - flat-selection-service
      - nets-payment-service
      - notification-api
    restart: always

  # Notification Service — RabbitMQ wrapper API
  notification-api:
    build:
      context: ./notification
      dockerfile: Dockerfile
    container_name: notification_api
    ports:
      - "5015:5000"
    env_file:
      - ./notification/.env
    restart: always

  # Notification Service — RabbitMQ consumer + Twilio SMS
  notification-consumer:
    build:
      context: ./notification
      dockerfile: Dockerfile.consumer
    container_name: notification_consumer
    env_file:
      - ./notification/.env
    environment:
      NOTIFICATION_QUEUE_NAME: hdb_notification_queue
    restart: always

  ballot-audit-db:
    image: mysql:8.0
    container_name: ballot_audit_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ballot_audits
    ports:
      - "3300:3306"
    volumes:
      - ballot_audit_db_data:/var/lib/mysql
      - ./ballot_audit/ballot_audits.sql:/docker-entrypoint-initdb.d/ballot_audits.sql:ro
    restart: always

  ballot-audit-service:
    build:
      context: ./ballot_audit
      dockerfile: Dockerfile
    container_name: ballot_audit_service
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: mysql+mysqlconnector://root:root@ballot-audit-db:3306/ballot_audits
      PROCESS_BALLOT_SERVICE_URL: http://process-ballot-service:5011
      REQUEST_TIMEOUT_SECONDS: 20
      SCHEDULER_TIMEZONE: Asia/Singapore
    depends_on:
      - ballot-audit-db
    restart: always

  flat-db:
    image: mysql:8.0
    container_name: flat_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flat_availability
    ports:
      - "3307:3306"
    volumes:
      - flat_db_data:/var/lib/mysql
      - ./flat/flats.sql:/docker-entrypoint-initdb.d/flats.sql:ro
    restart: always

  flat-service:
    build:
      context: ./flat
      dockerfile: Dockerfile
    container_name: flat_service
    ports:
      - "5006:5006"
      - "5017:5017" # WebSocket port
    environment:
      DB_HOST: flat-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: flat_availability
    depends_on:
      - flat-db
    restart: always

  flat-selection-db:
    image: mysql:8.0
    container_name: flat_selection_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flat_selection
    ports:
      - "3302:3306"
    volumes:
      - flat_selection_db_data:/var/lib/mysql
      - ./flat_selection/flat_selection.sql:/docker-entrypoint-initdb.d/flat_selection.sql:ro
    restart: always

  flat-selection-service:
    build:
      context: ./flat_selection
      dockerfile: Dockerfile
    container_name: flat_selection_service
    ports:
      - "5002:5002"
    environment:
      DATABASE_URL: mysql+mysqlconnector://root:root@flat-selection-db:3306/flat_selection
    depends_on:
      - flat-selection-db
    restart: always

  process-ballot-service:
    build:
      context: ./process_ballot
      dockerfile: Dockerfile
    container_name: process_ballot_service
    ports:
      - "5011:5011"
    env_file:
      - ./notification/.env
    environment:
      BALLOT_AUDIT_SERVICE_URL: http://ballot-audit-service:5000
      BALLOT_SERVICE_URL: http://ballot-service:5005
      APPLICATION_SERVICE_URL: http://application-service:5004
      PROJECT_SERVICE_URL: ${PROJECT_SERVICE_URL:-https://personal-iu6aefgj.outsystemscloud.com/ProjectsMicroservice/rest/ProjectsAPI}
      VALIDATE_ELIGIBILITY_SERVICE_URL: http://validate-eligibility-service:5013
      FLAT_SELECTION_SERVICE_URL: http://flat-selection-service:5002
      NOTIFICATION_SERVICE_URL: http://notification-api:5000
      NOTIFICATION_QUEUE_NAME: hdb_notification_queue
      REQUEST_TIMEOUT_SECONDS: 20
    depends_on:
      - application-service
      - validate-eligibility-service
      - ballot-service
      - flat-selection-service
      - notification-api
    restart: always

volumes:
  kong_pgdata:
  document_db_data:
  application_db_data:
  hfe_application_db_data:
  ballot_audit_db_data:
  flat_db_data:
  flat_selection_db_data:
