services:
  # ============================================================
  # Kong API Gateway (DB-less / Declarative mode)
  # ============================================================
  kong:
    image: kong:3.6
    container_name: kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_LOG_LEVEL: info
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000"   # Proxy - all API requests go here
      - "8001:8001"   # Admin API (optional, for debugging)
    depends_on:
      - applicant
      - flat_availability
      - flat_selection
      - nets_payment
      - flat_allocation
      - notification
    restart: always

  # ============================================================
  # Infrastructure
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - ./applicant/applicant.sql:/docker-entrypoint-initdb.d/01-applicant.sql:ro
      - ./flat_availability/flat_availability.sql:/docker-entrypoint-initdb.d/02-flat_availability.sql:ro
      - ./flat_selection/flat_selection.sql:/docker-entrypoint-initdb.d/03-flat_selection.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================================
  # Atomic Services
  # ============================================================
  applicant:
    build: ./applicant
    container_name: applicant
    ports:
      - "5001:5001"
    environment:
      SQLALCHEMY_DATABASE_URI: mysql+mysqlconnector://root@mysql:3306/applicant
    depends_on:
      mysql:
        condition: service_healthy

  flat_availability:
    build: ./flat_availability
    container_name: flat_availability
    ports:
      - "5006:5006"
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: flat_availability
    depends_on:
      mysql:
        condition: service_healthy

  flat_selection:
    build: ./flat_selection
    container_name: flat_selection
    ports:
      - "5002:5002"
    environment:
      DATABASE_URL: mysql+mysqlconnector://root@mysql:3306/flat_selection
    depends_on:
      mysql:
        condition: service_healthy

  nets_payment:
    build: ./nets_payment
    container_name: nets_payment
    ports:
      - "5003:5003"
    environment:
      NETS_API_KEY_ID: ${NETS_API_KEY_ID:-your-api-key-id}
      NETS_SECRET_KEY: ${NETS_SECRET_KEY:-your-secret-key}
      NETS_MID: ${NETS_MID:-your-umid}
      NETS_ENVIRONMENT: ${NETS_ENVIRONMENT:-uat}
      NETS_CALLBACK_BASE: ${NETS_CALLBACK_BASE:-http://localhost:5003}

  notification:
    build: ./notification
    container_name: notification
    ports:
      - "5004:5004"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
    depends_on:
      rabbitmq:
        condition: service_started

  # ============================================================
  # Composite Service (Orchestrator)
  # ============================================================
  flat_allocation:
    build: ./flat_allocation
    container_name: flat_allocation
    ports:
      - "5005:5005"
    environment:
      FLAT_AVAILABILITY_URL: http://flat_availability:5006
      APPLICANT_URL: http://applicant:5001
      FLAT_SELECTION_URL: http://flat_selection:5002
      NETS_PAYMENT_URL: http://nets_payment:5003
      NOTIFICATION_URL: http://notification:5004
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
    depends_on:
      applicant:
        condition: service_started
      flat_selection:
        condition: service_started
      nets_payment:
        condition: service_started
      notification:
        condition: service_started
      rabbitmq:
        condition: service_started
