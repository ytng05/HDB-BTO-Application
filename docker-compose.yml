version: "3.8"

# =============================================================
# BTO System – Scenario 1: Apply for BTO + Check Eligibility
#
# Folder layout:
#   scenario_1/
#   ├── apply_for_ballot/          Composite  :5015
#   ├── ballot_application/        Atomic     :5010
#   ├── hfe_service/               Composite  :5014
#   ├── hfe_application/           Atomic     :5011
#   ├── eligibility_service/       Wrapper    :5004
#   ├── document_service_wrapper/  Wrapper    :5012
#   ├── notification_service/      Atomic     :5013
#   └── docker-compose.yml         ← this file
#
# External services assumed running elsewhere (adjust URLs if needed):
#   applicant          :5001
#   nets_payment       :5003
# =============================================================

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: bto_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Each schema file is loaded in alphabetical order on first init
      - ./ballot_application/schema.sql:/docker-entrypoint-initdb.d/01_ballot_application.sql
      - ./hfe_application/schema.sql:/docker-entrypoint-initdb.d/02_hfe_application.sql
      - ./eligibility_service/schema.sql:/docker-entrypoint-initdb.d/03_eligibility_service.sql
      # applicant DB schema lives in repo root; uncomment if running standalone
      # - ../../applicant.sql:/docker-entrypoint-initdb.d/00_applicant.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: bto_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI → http://localhost:15672  guest/guest
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Atomic services ─────────────────────────────────────────────────────────

  ballot_application:
    build:
      context: ./ballot_application
      dockerfile: Dockerfile
    container_name: ballot_application
    ports:
      - "5010:5010"
    environment:
      DATABASE_URL: mysql+mysqlconnector://root@mysql:3306/ballot_application
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  hfe_application:
    build:
      context: ./hfe_application
      dockerfile: Dockerfile
    container_name: hfe_application
    ports:
      - "5011:5011"
    environment:
      DATABASE_URL: mysql+mysqlconnector://root@mysql:3306/hfe_application
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  notification_service:
    build:
      context: ./notification_service
      dockerfile: Dockerfile
    container_name: notification_service
    ports:
      - "5013:5013"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  # ── Wrapper services ────────────────────────────────────────────────────────

  eligibility_service:
    build:
      context: ./eligibility_service
      dockerfile: Dockerfile
    container_name: eligibility_service
    ports:
      - "5004:5004"
    environment:
      DATABASE_URL:        mysql+mysqlconnector://root@mysql:3306/eligibility_service
      ICA_API_URL:         https://api.ica.gov.sg
      IRAS_API_URL:        https://api.iras.gov.sg
      CPF_API_URL:         https://api.cpf.gov.sg
      SLA_API_URL:         https://api.sla.gov.sg
      API_TIMEOUT:         "10"     # seconds per external API call
      API_MAX_RETRIES:     "2"      # retries on 5xx / connection error
      DEV_MODE:            "true"   # set to "false" in production
      INCOME_CEILING_SGD:  "168000" # $14k/month household ceiling
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  document_service_wrapper:
    build:
      context: ./document_service_wrapper
      dockerfile: Dockerfile
    container_name: document_service_wrapper
    ports:
      - "5012:5012"
    environment:
      OCR_API_URL: https://api.ocr.gov.sg
    restart: on-failure

  # ── Composite services ──────────────────────────────────────────────────────

  check_eligibility_for_ballot:
    build:
      context: ./check_eligibility_for_ballot
      dockerfile: Dockerfile
    container_name: check_eligibility_for_ballot
    ports:
      - "5016:5016"
    environment:
      APPLICANT_URL:    http://host.docker.internal:5001  # external service
      BALLOT_APP_URL:   http://ballot_application:5010
      HFE_APP_URL:      http://hfe_application:5011
      ELIGIBILITY_URL:  http://eligibility_service:5004
    depends_on:
      - ballot_application
      - hfe_application
      - eligibility_service
    restart: on-failure

  hfe_service:
    build:
      context: ./hfe_service
      dockerfile: Dockerfile
    container_name: hfe_service
    ports:
      - "5014:5014"
    environment:
      APPLICANT_URL:    http://host.docker.internal:5001  # external service
      HFE_APP_URL:      http://hfe_application:5011
      DOC_WRAPPER_URL:  http://document_service_wrapper:5012
      ELIGIBILITY_URL:  http://eligibility_service:5004
      NOTIFICATION_URL: http://notification_service:5013
      RABBITMQ_HOST:    rabbitmq
      RABBITMQ_PORT:    "5672"
    depends_on:
      - hfe_application
      - document_service_wrapper
      - eligibility_service
      - notification_service
    restart: on-failure

  apply_for_ballot:
    build:
      context: ./apply_for_ballot
      dockerfile: Dockerfile
    container_name: apply_for_ballot
    ports:
      - "5015:5015"
    environment:
      APPLICANT_URL:         http://host.docker.internal:5001  # external service
      NETS_URL:              http://host.docker.internal:5003  # external service
      BALLOT_APP_URL:        http://ballot_application:5010
      HFE_APP_URL:           http://hfe_application:5011
      DOC_WRAPPER_URL:       http://document_service_wrapper:5012
      NOTIFICATION_URL:      http://notification_service:5013
      CHECK_ELIGIBILITY_URL: http://check_eligibility_for_ballot:5016
      RABBITMQ_HOST:         rabbitmq
      RABBITMQ_PORT:         "5672"
    depends_on:
      - ballot_application
      - hfe_application
      - document_service_wrapper
      - notification_service
      - check_eligibility_for_ballot
    restart: on-failure

volumes:
  mysql_data:
