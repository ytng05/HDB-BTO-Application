_format_version: "3.0"
_transform: true

services:
  # --- Applicant Service ---
  - name: applicant-service
    url: http://applicant-service:5001
    routes:
      - name: applicant-route
        paths:
          - /api/applicant
        strip_path: true

  # --- Flat Selection Service ---
  - name: flat-selection-service
    url: http://flat-selection-service:5002
    routes:
      - name: flat-selection-route
        paths:
          - /api/flat-selection
        strip_path: true

  # --- NETS Payment Service ---
  - name: nets-payment-service
    url: http://nets-payment-service:5003
    routes:
      - name: nets-payment-route
        paths:
          - /api/payment
        strip_path: true

  # --- Flat Allocation Service ---
  - name: flat-allocation-service
    url: http://flat-allocation-service:5005
    routes:
      - name: flat-allocation-route
        paths:
          - /api/allocation
        strip_path: true

  # --- Flat Availability Service ---
  - name: flat-availability-service
    url: http://flat-availability-service:5006
    routes:
      - name: flat-availability-route
        paths:
          - /api/availability
        strip_path: true

  # --- Document Service ---
  - name: document-service
    url: http://document-service:5050
    routes:
      - name: document-route
        paths:
          - /api/documents
        strip_path: true

plugins:
  # --- Global CORS (replaces Flask-CORS in each service) ---
  - name: cors
    config:
      origins:
        - "http://localhost:5173"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Content-Type
        - Authorization
      credentials: true
      max_age: 3600

  # --- Rate limiting on application submission ---
  - name: rate-limiting
    service: applicant-service
    config:
      minute: 10
      hour: 50
      policy: local

  # --- Rate limiting on document upload ---
  - name: rate-limiting
    service: document-service
    config:
      minute: 20
      policy: local

  # --- Request logging ---
  - name: file-log
    config:
      path: /tmp/kong-access.log
      reopen: true
